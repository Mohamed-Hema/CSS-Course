<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lesson 02 – CSS Selectors | BrewHaven Coffee</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>BrewHaven Coffee</h1>
    <p class="quote">Artisan roasts, cozy vibes</p>

    <h2 class="menu">Our Menu</h2>

    <div class="menu-section" id="menu-full">
      <div class="menu-item">Espresso — $3.50</div>
      <div class="menu-item">Cappuccino — $4.50</div>
      <div class="menu-item">Cold Brew — $4.00</div>
      <div class="menu-item">Matcha Latte — $5.00</div>
      <p>All drinks made with locally roasted beans.</p>
    </div>

    <h2>Specials</h2>

    <div id="special-offer">
      <h3>Today's Special</h3>
      <p>Buy any two drinks and get a pastry free!</p>
    </div>

    <div class="menu-section">
      <p>Ask your barista about seasonal flavors.</p>
    </div>
  </body>
</html>
